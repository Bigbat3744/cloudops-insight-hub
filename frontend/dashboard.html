<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudOps Cost Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .metric {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .metric-value {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .metric-label {
            font-size: 0.9em;
            opacity: 0.9;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #5568d3;
        }
        
        button.active {
            background: #764ba2;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }
        
        .error {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        
        .service-list {
            margin-top: 20px;
        }
        
        .service-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid #eee;
        }
        
        .service-item:last-child {
            border-bottom: none;
        }
        
        .service-name {
            font-weight: 500;
        }
        
        .service-cost {
            color: #667eea;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>☁️ CloudOps Cost Dashboard</h1>
            <p>AWS Cost Monitoring & Analysis Platform</p>
        </div>

        <div id="error" class="error" style="display: none;"></div>

        <div class="metrics" id="metrics">
            <div class="metric">
                <div class="metric-value" id="totalCost">--</div>
                <div class="metric-label">Total Cost (USD)</div>
            </div>
            <div class="metric">
                <div class="metric-value" id="serviceCount">--</div>
                <div class="metric-label">Services Used</div>
            </div>
            <div class="metric">
                <div class="metric-value" id="period">--</div>
                <div class="metric-label">Period (Days)</div>
            </div>
        </div>

        <div class="card">
            <div class="controls">
                <button onclick="loadData(7)" class="active" id="btn-7">Last 7 Days</button>
                <button onclick="loadData(30)" id="btn-30">Last 30 Days</button>
                <button onclick="loadData(90)" id="btn-90">Last 90 Days</button>
            </div>

            <div id="loading" class="loading" style="display: none;">
                Loading cost data...
            </div>

            <canvas id="costChart"></canvas>
        </div>

        <div class="card">
            <h2>Cost by Service</h2>
            <div class="service-list" id="serviceList"></div>
        </div>
    </div>

    <script>
        // REPLACE THIS WITH YOUR ACTUAL API GATEWAY URL
        const API_URL = 'https://a32yiobfbc.execute-api.us-east-1.amazonaws.com/usage';
        
        let chart = null;

        async function loadData(days) {
            // Update button states
            document.querySelectorAll('button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${days}`).classList.add('active');

            // Show loading
            document.getElementById('loading').style.display = 'block';
            document.getElementById('error').style.display = 'none';

            try {
                const response = await fetch(`${API_URL}?days=${days}`);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Failed to fetch data');
                }

                displayData(data.data);
            } catch (error) {
                document.getElementById('error').textContent = `Error: ${error.message}`;
                document.getElementById('error').style.display = 'block';
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function displayData(data) {
            // Update metrics
            document.getElementById('totalCost').textContent = `$${Math.abs(data.total_cost).toFixed(2)}`;
            document.getElementById('serviceCount').textContent = data.service_count;
            document.getElementById('period').textContent = data.period_days;

            // Update service list
            const serviceList = document.getElementById('serviceList');
            serviceList.innerHTML = '';

            const sortedServices = Object.entries(data.by_service)
                .sort((a, b) => Math.abs(b[1]) - Math.abs(a[1]));

            sortedServices.forEach(([service, cost]) => {
                const item = document.createElement('div');
                item.className = 'service-item';
                item.innerHTML = `
                    <span class="service-name">${service}</span>
                    <span class="service-cost">$${Math.abs(cost).toFixed(2)}</span>
                `;
                serviceList.appendChild(item);
            });

            // Update chart
            updateChart(data);
        }

        function updateChart(data) {
            const ctx = document.getElementById('costChart').getContext('2d');

            const services = Object.keys(data.by_service);
            const costs = Object.values(data.by_service).map(c => Math.abs(c));

            if (chart) {
                chart.destroy();
            }

            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: services,
                    datasets: [{
                        label: 'Cost (USD)',
                        data: costs,
                        backgroundColor: 'rgba(102, 126, 234, 0.8)',
                        borderColor: 'rgba(102, 126, 234, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            display: false
                        },
                        title: {
                            display: true,
                            text: 'AWS Cost by Service'
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: function(value) {
                                    return '$' + value.toFixed(2);
                                }
                            }
                        }
                    }
                }
            });
        }

        // Load initial data
        loadData(7);
    </script>
</body>
</html>
